<!doctype html>
<html lang="es" data-theme="light" data-lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Radar estatico para revisar SPF, DMARC, DKIM, MX, MTA-STS, TLS-RPT y BIMI de un dominio."
    >
    <title>MailShield Radar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./assets/styles.css?v=20260427-1">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <header class="masthead">
          <div>
            <p class="eyebrow" data-i18n="eyebrow">Radar DNS de correo</p>
            <h1 id="app-title">MailShield Radar</h1>
          </div>
          <div class="masthead-actions">
            <button
              type="button"
              class="theme-toggle"
              id="themeToggle"
              aria-pressed="false"
              aria-label="Cambiar modo oscuro"
            >
              <span class="toggle-track" aria-hidden="true">
                <span class="toggle-thumb"></span>
              </span>
              <span id="themeToggleText" data-i18n="themeDark">Modo oscuro</span>
            </button>
            <button
              type="button"
              class="language-toggle"
              id="languageToggle"
              aria-pressed="false"
              aria-label="Cambiar idioma"
            >
              <span class="toggle-track" aria-hidden="true">
                <span class="toggle-thumb"></span>
              </span>
              <span id="languageToggleText">English</span>
            </button>
            <output id="runStatus" class="status-pill" aria-live="polite">Listo</output>
          </div>
        </header>

        <form id="auditForm" class="control-panel">
          <div class="domain-row">
            <label class="field domain-field" for="domainInput">
              <span data-i18n="domain">Dominio</span>
              <input
                id="domainInput"
                name="domain"
                type="text"
                inputmode="url"
                autocomplete="url"
                placeholder="dominio.com"
                data-i18n-placeholder="domainPlaceholder"
                required
              >
            </label>
            <button class="primary-action" type="submit" id="auditButton" data-i18n="analyze">Analizar</button>
            <button class="secondary-action" type="button" id="sampleButton" data-i18n="sample">Ejemplo</button>
          </div>

          <div class="settings-grid">
            <label class="field" for="resolverSelect">
              <span data-i18n="resolver">Resolver</span>
              <select id="resolverSelect" name="resolver">
                <option value="auto" data-i18n="automatic">Automatico</option>
                <option value="google">Google DNS</option>
                <option value="cloudflare">Cloudflare DNS</option>
              </select>
            </label>

            <fieldset class="segmented-field selector-strategy">
              <legend data-i18n="dkimMode">Modo DKIM</legend>
              <label>
                <input type="radio" name="selectorStrategy" value="auto" checked>
                <span data-i18n="automatic">Automatico</span>
              </label>
              <label>
                <input type="radio" name="selectorStrategy" value="specific">
                <span data-i18n="specific">Especifico</span>
              </label>
            </fieldset>

            <label class="field" for="selectorDepth">
              <span data-i18n="coverage">Cobertura</span>
              <select id="selectorDepth" name="selectorDepth">
                <option value="quick" data-i18n="quick">Rapida</option>
                <option value="broad" data-i18n="broad">Amplia</option>
              </select>
            </label>

            <label class="field selectors-field" for="customSelectors">
              <span id="selectorLabel">Selectores extra</span>
              <textarea
                id="customSelectors"
                name="customSelectors"
                rows="2"
                spellcheck="false"
                placeholder="selector1, selector2, google, k1"
                data-i18n-placeholder="extraSelectorsPlaceholder"
              ></textarea>
            </label>
          </div>
        </form>

        <section id="summary" class="summary-grid" aria-label="Resumen" hidden></section>

        <section class="status-legend" aria-label="Leyenda de estados">
          <span class="legend-label" data-i18n="statusLegend">Estados</span>
          <span class="legend-item"><span class="status-dot pass"></span><span>OK</span></span>
          <span class="legend-item"><span class="status-dot warn"></span><span data-i18n="warning">Aviso</span></span>
          <span class="legend-item"><span class="status-dot fail"></span><span data-i18n="failure">Falla</span></span>
          <span class="legend-item"><span class="status-dot info"></span><span>Info</span></span>
        </section>

        <section class="results-grid" aria-label="Resultados">
          <article class="result-panel" id="scorePanel">
            <div class="empty-state">Score</div>
          </article>
          <article class="result-panel" id="spfPanel">
            <div class="empty-state">SPF</div>
          </article>
          <article class="result-panel" id="dkimPanel">
            <div class="empty-state">DKIM</div>
          </article>
          <article class="result-panel" id="dmarcPanel">
            <div class="empty-state">DMARC</div>
          </article>
          <article class="result-panel" id="mxPanel">
            <div class="empty-state">MX</div>
          </article>
          <article class="result-panel" id="extrasPanel">
            <div class="empty-state">MTA-STS / TLS-RPT / BIMI</div>
          </article>
          <article class="result-panel recommendations-panel" id="recommendationsPanel">
            <div class="empty-state">Recomendaciones</div>
          </article>
        </section>

        <section id="reportActions" class="report-actions" hidden>
          <button type="button" class="secondary-action" id="copyReportButton" data-i18n="copySummary">Copiar resumen</button>
          <button type="button" class="secondary-action" id="copyLinkButton" data-i18n="copyLink">Copiar enlace</button>
          <button type="button" class="secondary-action" id="downloadJsonButton" data-i18n="exportJson">Exportar JSON</button>
          <button type="button" class="secondary-action" id="downloadMdButton" data-i18n="exportMd">Exportar MD</button>
        </section>

        <footer class="site-footer">
          <span data-i18n="footerMade">Hecho por Luis Daniel (Juguitos)</span>
          <a href="https://github.com/Juguitos" target="_blank" rel="noreferrer">github.com/Juguitos</a>
        </footer>
      </section>
    </main>

    <script src="./assets/app.js?v=20260427-1" defer></script>
  </body>
</html>
