<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Radar estatico para revisar SPF, DMARC, DKIM, MX, MTA-STS, TLS-RPT y BIMI de un dominio."
    >
    <title>MailShield Radar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <header class="masthead">
          <div>
            <p class="eyebrow">Radar DNS de correo</p>
            <h1 id="app-title">MailShield Radar</h1>
          </div>
          <output id="runStatus" class="status-pill" aria-live="polite">Listo</output>
        </header>

        <form id="auditForm" class="control-panel">
          <div class="domain-row">
            <label class="field domain-field" for="domainInput">
              <span>Dominio</span>
              <input
                id="domainInput"
                name="domain"
                type="text"
                inputmode="url"
                autocomplete="url"
                placeholder="empresa.com"
                required
              >
            </label>
            <button class="primary-action" type="submit" id="auditButton">Analizar</button>
            <button class="secondary-action" type="button" id="sampleButton">Ejemplo</button>
          </div>

          <div class="settings-grid">
            <label class="field" for="resolverSelect">
              <span>Resolver</span>
              <select id="resolverSelect" name="resolver">
                <option value="auto">Automatico</option>
                <option value="google">Google DNS</option>
                <option value="cloudflare">Cloudflare DNS</option>
              </select>
            </label>

            <fieldset class="segmented-field">
              <legend>DKIM</legend>
              <label>
                <input type="radio" name="selectorMode" value="quick" checked>
                <span>Rapido</span>
              </label>
              <label>
                <input type="radio" name="selectorMode" value="broad">
                <span>Amplio</span>
              </label>
            </fieldset>

            <label class="field selectors-field" for="customSelectors">
              <span>Selectores extra</span>
              <textarea
                id="customSelectors"
                name="customSelectors"
                rows="2"
                spellcheck="false"
                placeholder="selector1, selector2, google, k1"
              ></textarea>
            </label>
          </div>
        </form>

        <section id="summary" class="summary-grid" aria-label="Resumen" hidden></section>

        <section class="results-grid" aria-label="Resultados">
          <article class="result-panel" id="spfPanel">
            <div class="empty-state">SPF</div>
          </article>
          <article class="result-panel" id="dkimPanel">
            <div class="empty-state">DKIM</div>
          </article>
          <article class="result-panel" id="dmarcPanel">
            <div class="empty-state">DMARC</div>
          </article>
          <article class="result-panel" id="mxPanel">
            <div class="empty-state">MX</div>
          </article>
          <article class="result-panel" id="extrasPanel">
            <div class="empty-state">MTA-STS / TLS-RPT / BIMI</div>
          </article>
        </section>

        <section id="reportActions" class="report-actions" hidden>
          <button type="button" class="secondary-action" id="copyReportButton">Copiar resumen</button>
          <button type="button" class="secondary-action" id="downloadJsonButton">Exportar JSON</button>
        </section>
      </section>
    </main>

    <script src="./assets/app.js" defer></script>
  </body>
</html>
